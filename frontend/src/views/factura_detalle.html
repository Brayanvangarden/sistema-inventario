<!-- Botones de acción (fuera del ticket) -->
<div style="text-align:center; margin: 20px 0; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
  <button onclick="volverFacturas()"
    style="padding:10px 20px; background:#6c757d; color:white; border:none; border-radius:6px; cursor:pointer; font-size:14px;">
    ⬅ Volver a Facturas
  </button>
  <button onclick="descargarFactura()"
    style="padding:10px 20px; background:#4CAF50; color:white; border:none; border-radius:6px; cursor:pointer; font-size:14px;">
    ⬇ Descargar PDF
  </button>
  <button onclick="reenviarFactura()"
    style="padding:10px 20px; background:#2196F3; color:white; border:none; border-radius:6px; cursor:pointer; font-size:14px;">
    📧 Reenviar Factura
  </button>
  <button onclick="imprimirFactura()"
  style="padding:10px 20px; background:#ff9800; color:white; border:none; border-radius:6px; cursor:pointer; font-size:14px;">
  🖨 Imprimir
</button>
</div>

<!-- TICKET (esto es lo que se descarga) -->
<div id="ticketFactura" style="
  width: 380px;
  margin: 0 auto 30px auto;
  background: white;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 24px 20px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
">
  <!-- Encabezado -->
  <div style="text-align:center; border-bottom: 2px dashed #ccc; padding-bottom:12px; margin-bottom:12px;">
    <div style="font-size:22px; font-weight:bold; color:#2e7d32; letter-spacing:1px;">
      Suplidora y Academia
    </div>
    <div style="font-size:18px; font-weight:bold; color:#1b5e20;">Style</div>
    <div style="font-size:11px; color:#777; margin-top:4px;">📍 Su dirección aquí</div>
    <div style="font-size:11px; color:#777;">📞 Su teléfono aquí</div>
  </div>

  <!-- Info factura -->
  <div id="infoFactura" style="margin-bottom:12px; line-height:1.8;"></div>

  <!-- Línea divisoria -->
  <div style="border-top:1px dashed #ccc; margin: 8px 0;"></div>

  <!-- Encabezado tabla -->
  <div style="display:grid; grid-template-columns:2fr 0.5fr 1fr 1fr; font-weight:bold; font-size:11px; color:#555; padding: 4px 0; border-bottom:1px solid #ccc;">
    <span>Producto</span>
    <span style="text-align:center">Cant</span>
    <span style="text-align:right">Precio</span>
    <span style="text-align:right">Subtotal</span>
  </div>

  <!-- Productos -->
  <div id="detalle" style="margin: 6px 0;"></div>

  <!-- Línea divisoria -->
  <div style="border-top:2px dashed #ccc; margin: 8px 0;"></div>

  <!-- Total -->
  <div style="display:flex; justify-content:space-between; font-size:16px; font-weight:bold; margin: 8px 0;">
    <span>TOTAL</span>
    <span>₡ <span id="total">0.00</span></span>
  </div>

  <!-- Pie -->
  <div style="border-top:2px dashed #ccc; margin-top:12px; padding-top:10px; text-align:center; font-size:11px; color:#888; line-height:1.8;">
    <div>¡Gracias por su compra!</div>
    <div>Vuelva pronto 🌸</div>
    <div style="margin-top:6px; font-size:10px;">— Suplidora y Academia Style —</div>
  </div>
</div>
