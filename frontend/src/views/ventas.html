<h2 style="text-align:center; color:#4CAF50;">💰 Punto de Venta</h2>

<!-- CLIENTE -->
<div style="margin-bottom:20px; text-align:center;">
  <label for="cliente" style="font-weight:bold; margin-right:10px;">Cliente:</label>
  <select id="cliente" style="padding:8px; border-radius:4px; border:1px solid #ccc;">
      <option value="">Cliente contado</option>
  </select>
</div>

<!-- PRODUCTOS -->
<div style="margin-bottom:20px; display:flex; justify-content:center; align-items:center;">
    
    <input type="text" id="busqueda" onkeyup="buscarProductos()">

</div>

<!-- Tabla de productos -->
<table border="1" style="width:80%; margin:auto; border-collapse:collapse; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    <thead style="background-color:#f2f2f2;">
        <tr>
            <th style="padding:10px;">Producto</th>
            <th style="padding:10px;">Precio</th>
            <th style="padding:10px;">Acción</th>
        </tr>
    </thead>
    <tbody id="listaProductos"></tbody>
</table>

<hr style="margin:40px 0; border:none; border-top:2px solid #eee;">

<!-- CARRITO -->
<h3 style="text-align:center; margin-bottom:20px;">🛒 Carrito</h3>

<table border="1" style="width:80%; margin:auto; border-collapse:collapse; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    <thead style="background-color:#f2f2f2;">
        <tr>
            <th style="padding:10px;">Producto</th>
            <th style="padding:10px;">Cantidad</th>
            <th style="padding:10px;">Precio</th>
            <th style="padding:10px;">Subtotal</th>
            <th style="padding:10px;">Eliminar</th>
        </tr>
    </thead>
    <tbody id="carrito"></tbody>
</table>

<h3 style="text-align:center; margin-top:20px;">Total: ₡ <span id="total">0</span></h3>

<div style="text-align:center; margin-top:20px;">
  <button onclick="realizarVenta()" style="padding:10px 20px; background-color:#4CAF50; color:white; border:none; border-radius:4px; cursor:pointer; font-size:16px;">💰 Vender</button>
</div>

<!-- Toast para notificaciones -->
<div id="toast" class="toast" style="
  visibility: hidden;
  min-width: 250px;
  margin-left: -125px;
  background-color: #333;
  color: #fff;
  text-align: center;
  border-radius: 2px;
  padding: 16px;
  position: fixed;
  z-index: 1;
  left: 50%;
  bottom: 30px;
  font-size: 17px;
"></div>
