<div style="width:90%; margin:auto; margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;">

  <input type="text" id="filtroCliente" placeholder="🔍 Cliente"
    style="padding:8px; border-radius:6px; border:1px solid #ccc;" />

  <input type="date" id="filtroFecha"
    style="padding:8px; border-radius:6px; border:1px solid #ccc;" />

  <select id="filtroEstado"
  style="padding:8px; border-radius:6px; border:1px solid #ccc;">
  <option value="">Todos los estados</option>
  <option value="PAGADA">Pagada</option>      <!-- 👈 mayúsculas como en DB -->
  <option value="PENDIENTE">Pendiente</option>
</select>

  <button onclick="cargarFacturas()"
    style="background:#4CAF50; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;">
    Filtrar
  </button>

</div>

<table style="width:90%; margin:auto; border-collapse:collapse; box-shadow:0 4px 8px rgba(0,0,0,0.1);">
    <thead style="background:#f2f2f2;">
        <tr>
            <th style="padding:12px;">N°</th>
            <th style="padding:12px;">Fecha</th>
            <th style="padding:12px;">Cliente</th>
            <th style="padding:12px;">Usuario</th>
            <th style="padding:12px;">Total</th>
            <th style="padding:12px;">Estado</th>
            <th style="padding:12px;">Acciones</th>
        </tr>
    </thead>
    <tbody id="tablaFacturas"></tbody>
</table>

<div id="toast" class="toast"></div>
