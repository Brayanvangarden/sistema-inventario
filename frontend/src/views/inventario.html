<h2 style="text-align:center; color:#4FACFE; margin-bottom:20px;">📦 Gestión de Inventario</h2>

<div style="text-align:center; margin-bottom:20px;">
    <button onclick="mostrarFormularioInventario()" style="padding:10px 20px; background-color:#4CAF50; color:white; border:none; border-radius:6px; cursor:pointer; font-size:16px;">+ Nuevo Inventario</button>
</div>

<!-- Formulario de inventario -->
<div id="formularioInventario" style="display:none; margin-top:20px; max-width:600px; margin-left:auto; margin-right:auto; padding:20px; background:#fff; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
    <input type="hidden" id="idInventario">

    <div style="margin-bottom:15px;">
        <select id="producto" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
            <option value="">Seleccione producto</option>
            <!-- Opciones dinámicas -->
        </select>
    </div>

    <div style="margin-bottom:15px;">
        <input type="number" id="stock" placeholder="Stock" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
    </div>
    <div style="margin-bottom:15px;">
        <input type="number" id="stock_minimo" placeholder="Stock mínimo" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
    </div>

    <div style="display:flex; justify-content:center; gap:10px;">
        <button onclick="guardarInventario()" style="padding:10px 20px; background-color:#4FACFE; color:white; border:none; border-radius:6px; cursor:pointer;">💾 Guardar</button>
        <button onclick="cancelarInventario()" style="padding:10px 20px; background-color:#ccc; color:#333; border:none; border-radius:6px; cursor:pointer;">❌ Cancelar</button>
    </div>
</div>
<div style="width:90%; margin:auto; margin-bottom:15px;">
  <input type="text" id="filtroInventario" placeholder="🔍 Buscar producto..."
    style="padding:8px; border-radius:6px; border:1px solid #ccc; width:300px;"
    oninput="cargarInventario()" />
</div>
<!-- Tabla de inventario -->
<table style="width:90%; margin:auto; margin-top:20px; border-collapse:collapse; box-shadow:0 4px 8px rgba(0,0,0,0.1);">
    <thead style="background:#f2f2f2;">
        <tr>
            <th style="padding:12px;">Producto</th>
            <th style="padding:12px;">Stock</th>
            <th style="padding:12px;">Stock mínimo</th>
            <th style="padding:12px;">Estado</th>
            <th style="padding:12px;">Acciones</th>
        </tr>
    </thead>
    <tbody id="tablaInventario"></tbody>
</table>

<!-- Modal eliminar inventario -->
<div id="modalEliminarInventario" class="modal" style="display:none;">
  <div class="modal-content" style="width:350px; padding:20px; background:#fff; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
    <h3 style="margin-bottom:15px;">🗑️ Eliminar inventario</h3>
    <p style="margin-bottom:20px;">¿Seguro que deseas eliminar este registro?</p>
    <div style="display:flex; justify-content:center; gap:15px;">
      <button onclick="confirmarEliminarInventario()" style="padding:8px 12px; background-color:#e74c3c; color:white; border:none; border-radius:6px; cursor:pointer;">Eliminar</button>
      <button onclick="cerrarModalInventario()" style="padding:8px 12px; background-color:#ccc; color:#333; border:none; border-radius:6px; cursor:pointer;">Cancelar</button>
    </div>
  </div>
</div>

<!-- Toast de notificación -->
<div id="toast" class="toast"></div>
