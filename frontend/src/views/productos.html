<h2 style="text-align:center; color:#4FACFE; margin-bottom:20px;">📦 Gestión de Productos</h2>

<div style="text-align:center; margin-bottom:20px;">
    <button onclick="mostrarFormulario()" style="padding:10px 20px; background-color:#4FACFE; color:white; border:none; border-radius:6px; cursor:pointer; font-size:16px;">+ Nuevo Producto</button>
</div>

<!-- Formulario de producto -->
<div id="formulario" style="display:none; margin-top:20px; max-width:600px; margin-left:auto; margin-right:auto; padding:20px; background:#fff; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
    <input type="hidden" id="idProducto">

    <div style="margin-bottom:15px;">
        <input type="text" id="nombre" placeholder="Nombre" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
    </div>
    <div style="margin-bottom:15px;">
        <input type="text" id="codigo" placeholder="Código" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
    </div>

    <div style="margin-bottom:15px;">
        <select id="categoria" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
            <option value="">Seleccione categoría</option>
            <!-- Opciones dinámicas -->
        </select>
    </div>

    <div style="margin-bottom:15px;">
        <input type="number" id="precio_compra" placeholder="Precio compra" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
    </div>
    <div style="margin-bottom:15px;">
        <input type="number" id="precio_venta" placeholder="Precio venta" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
    </div>

    <div style="display:flex; justify-content:center; gap:10px;">
        <button onclick="guardarProducto()" style="padding:10px 20px; background-color:#4FACFE; color:white; border:none; border-radius:6px; cursor:pointer;">💾 Guardar</button>
        <button onclick="cancelarProducto()" style="padding:10px 20px; background-color:#ccc; color:#333; border:none; border-radius:6px; cursor:pointer;">❌ Cancelar</button>
    </div>
</div>
<div style="width:90%; margin:auto; margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;">

  <input type="text" id="filtroNombre" placeholder="🔍 Nombre"
    style="padding:8px; border-radius:6px; border:1px solid #ccc;" />


  <button onclick="cargarProductos()"
    style="background:#4FACFE; color:white; border:none; padding:8px 15px; border-radius:6px;">
    Filtrar
  </button>

</div>

<!-- Tabla de productos -->
<table style="width:90%; margin:auto; margin-top:20px; border-collapse:collapse; box-shadow:0 4px 8px rgba(0,0,0,0.1);">
    <thead style="background:#f2f2f2;">
        <tr>
            <th style="padding:12px;">Nombre</th>
            <th style="padding:12px;">Código</th>
            <th style="padding:12px;">Categoría</th>
            <th style="padding:12px;">Precio Venta</th>
            <th style="padding:12px;">Acciones</th>
        </tr>
    </thead>
    <tbody id="tablaProductos"></tbody>
</table>

<!-- Paginación -->
<div style="margin-top:10px; display:flex; justify-content:center; align-items:center; gap:15px;">
    <button onclick="anterior()" style="padding:8px 12px; border:none; border-radius:6px; background-color:#4FACFE; color:white; cursor:pointer;">⬅ Anterior</button>
    <span id="paginaInfo" style="font-weight:bold;">Página 1</span>
    <button onclick="siguiente()" style="padding:8px 12px; border:none; border-radius:6px; background-color:#4FACFE; color:white; cursor:pointer;">Siguiente ➡</button>
</div>

<!-- Modal eliminar producto -->
<div id="modalEliminar" class="modal">
  <div class="modal-content" style="width:350px;">
    <h3 style="margin-bottom:15px;">🗑️ Eliminar producto</h3>
    <p style="margin-bottom:20px;">¿Seguro que deseas eliminar este producto?</p>
    <div style="display:flex; justify-content:center; gap:15px;">
        <button onclick="confirmarEliminarProducto()" class="btn-eliminar">Eliminar</button>
        <button onclick="cerrarModal()" class="btn-cancelar">Cancelar</button>
    </div>
  </div>
</div>

<!-- Toast de notificación -->
<div id="toast" class="toast"></div>
