<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login — Style</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e8f5e9, #f3e5f5);
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 340px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }

    .logo-circle {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #f3e5f5;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 12px;
    }

    .card h1 {
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      color: #222;
      margin-bottom: 4px;
    }

    .card .subtitulo {
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 14px;
      transition: border 0.2s;
      outline: none;
    }

    input:focus { border-color: #7c3aed; }

    .forgot {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 1.25rem;
    }

    .forgot a {
      font-size: 12px;
      color: #7c3aed;
      text-decoration: none;
      cursor: pointer;
    }

    .forgot a:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #6d28d9; }

    .pie {
      font-size: 11px;
      color: #bbb;
      text-align: center;
      margin-top: 1.25rem;
    }

    /* Modal recuperar */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .overlay.activo { display: flex; }

    .modal {
      background: white;
      border-radius: 14px;
      padding: 1.75rem;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .modal p  { font-size: 13px; color: #666; margin-bottom: 1rem; }

    .modal-btns {
      display: flex; gap: 10px; margin-top: 1rem;
    }

    .modal-btns button {
      flex: 1; padding: 10px;
      border-radius: 8px; border: none;
      font-size: 13px; cursor: pointer;
    }

    .btn-cancelar { background: #f3f4f6; color: #555; }
    .btn-enviar   { background: #7c3aed; color: white; font-weight: 600; }
    .btn-enviar:hover { background: #6d28d9; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-circle">💄</div>
  <h1>Suplidora y Academia Style</h1>
  <p class="subtitulo">Ingresá con tu cuenta</p>

  <label for="usuario">Usuario</label>
  <input type="text" id="usuario">

  <label for="contrasena">Contraseña</label>
  <input type="password" id="contrasena" placeholder="••••••••">

  <div class="forgot">
    <a onclick="abrirModal()">¿Olvidaste tu contraseña?</a>
  </div>

  <button class="btn-login" onclick="login()">Ingresar</button>
  <p class="pie">Sistema interno — solo personal autorizado</p>
</div>

<!-- Modal recuperar contraseña -->
<div class="overlay" id="modalRecuperar">
  <div class="modal">
    <h2>Recuperar contraseña</h2>
    <p>Ingresá tu usuario y le avisamos al administrador para restablecer tu acceso.</p>
    <label for="usuarioRecuperar">Usuario</label>
    <input type="text" id="usuarioRecuperar" style="width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; margin-top:4px;">
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-enviar"   onclick="solicitarRecupero()">Solicitar</button>
    </div>
  </div>
</div>

<script src="../js/renderer.js"></script>
<script>
  function abrirModal()  { document.getElementById("modalRecuperar").classList.add("activo"); }
  function cerrarModal() { document.getElementById("modalRecuperar").classList.remove("activo"); }

  async function solicitarRecupero() {
  const usuario = document.getElementById("usuarioRecuperar").value.trim();
  if (!usuario) { alert("Ingresá tu usuario"); return; }

  try {
    const res = await fetch("http://localhost:3000/api/recuperar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario })
    });

    const data = await res.json();
    cerrarModal();

    alert(res.ok
      ? `✅ ${data.mensaje}`
      : `❌ ${data.error}`
    );
  } catch {
    cerrarModal();
    alert("No se pudo conectar con el servidor.");
  }
}
</script>

</body>
</html>
